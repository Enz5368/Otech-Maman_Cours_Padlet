name: Déployer sur TrueNAS

on:
  push:
    branches:
      - main

  # Permet aussi de lancer le déploiement manuellement.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Mise à jour de monespaceprof.com
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Installer cloudflared
        run: |
          curl -L \
            --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Configurer la clé SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat > ~/.ssh/config <<EOF
          Host truenas-deploy
              HostName $SSH_HOST
              User $SSH_USER
              IdentityFile ~/.ssh/deploy_key
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new
              ProxyCommand cloudflared access ssh --hostname %h --service-token-id "$CF_ACCESS_CLIENT_ID" --service-token-secret "$CF_ACCESS_CLIENT_SECRET"
          EOF

          chmod 600 ~/.ssh/config

      - name: Déployer le site
        run: |
          ssh truenas-deploy <<'REMOTE'
            set -e

            REPO="/mnt/DriveMaison/Database/deploy/apps/Otech-Maman_Cours_Padlet"
            SITE="/mnt/DriveMaison/Sites/monespaceprof"

            cd "$REPO"

            git fetch origin main
            git reset --hard origin/main

            mkdir -p "$SITE"

            rsync -a --delete \
              --exclude=".git/" \
              --exclude=".github/" \
              --exclude="README.md" \
              --exclude="netlify.toml" \
              "$REPO/" "$SITE/"

            echo "Déploiement terminé : $(date)"
          REMOTE
