server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    autoindex off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|mp4|webm|mp3|wav|ogg)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}

